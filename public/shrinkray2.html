<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>HTML Shrinkray v3</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #2563eb;
            --secondary: #64748b;
            --border: #e2e8f0;
            --accent: #f1f5f9;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            height: 100vh;
            display: none; 
        }

        body.ui-visible { display: flex; flex-direction: column; }

        body.preview-fs .main-container { display: block; padding: 0; }
        body.preview-fs .panel:not(.preview-panel), 
        body.preview-fs header, 
        body.preview-fs .center-actions { display: none; }
        body.preview-fs .preview-panel { position: fixed; inset: 0; z-index: 100; border: none; border-radius: 0; height: 100vh; }

        header {
            padding: 0.75rem 1.5rem;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .url-box {
            background: var(--accent);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
            max-width: 40%;
            min-width: 200px;
        }

        .url-display-input {
            font-family: monospace;
            font-size: 0.7rem;
            background: transparent;
            border: none;
            color: var(--secondary);
            width: 100%;
            outline: none;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 100px 1fr;
            grid-template-rows: 1fr 1.5fr;
            gap: 1rem;
            padding: 1rem;
            flex-grow: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 0.5rem 1rem;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .preview-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            text-transform: none;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .preview-url-field {
            width: 200px;
            font-family: monospace;
            font-size: 10px;
            padding: 2px 6px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: #94a3b8;
            text-overflow: ellipsis;
        }

        .center-actions {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            align-items: center;
        }

        textarea {
            flex-grow: 1;
            border: none;
            padding: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            resize: none;
            outline: none;
        }

        #preview-frame { background: white; width: 100%; height: 100%; border: none; }

        button {
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        button:hover { opacity: 0.8; }
        button.primary { background: var(--primary); color: white; border: none; }
        button.success { background: var(--success); color: white; border: none; }
        button.danger { color: var(--danger); }
        button.warning { background: var(--warning); color: white; border: none; }
        button.sm { font-size: 0.7rem; padding: 2px 6px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #render-menu {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 10000;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        #render-menu:hover { opacity: 1; }

        .short-url-section {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .short-url-input {
            font-family: monospace;
            font-size: 0.7rem;
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            min-width: 150px;
        }

        .status-badge {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .status-badge.success { background: #dcfce7; color: #166534; }
        .status-badge.error { background: #fee2e2; color: #991b1b; }
        .status-badge.loading { background: #fef08a; color: #854d0e; }
        .status-badge.info { background: #dbeafe; color: #1e40af; }

        /* Modal styles */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10001;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card);
            border-radius: 12px;
            max-width: 90%;
            width: 800px;
            max-height: 90vh;
            padding: 24px;
            overflow: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal h2 { margin-top: 0; }
        .modal textarea {
            width: 100%;
            height: 300px;
            font-family: monospace;
            font-size: 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 8px;
            background: var(--bg);
        }
        .modal .preview-area {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 8px;
            max-height: 200px;
            overflow: auto;
            font-family: monospace;
            font-size: 11px;
            white-space: pre-wrap;
            margin: 8px 0;
        }
        .modal .actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }
        .modal .match-info {
            padding: 8px;
            border-radius: 4px;
            margin: 8px 0;
            font-size: 0.85rem;
        }
        .modal .match-info.success { background: #dcfce7; color: #166534; }
        .modal .match-info.error { background: #fee2e2; color: #991b1b; }
        .modal .match-info.warning { background: #fef08a; color: #854d0e; }
    </style>
</head>
<body>

<!-- Modal -->
<div class="modal-overlay" id="patch-modal">
    <div class="modal">
        <h2>📝 Apply Patch</h2>
        <p>Enter a patch in FIND/REPLACE format:</p>
        <textarea id="patch-input" placeholder="&lt;&lt;&lt;FIND
[lines to find]
&gt;&gt;&gt;
&lt;&lt;&lt;REPLACE
[lines to replace with]
&gt;&gt;&gt;"></textarea>
        <div id="patch-preview" style="display:none;">
            <div id="patch-match-info" class="match-info"></div>
            <div class="preview-area" id="patch-preview-content"></div>
        </div>
        <div class="actions">
            <button onclick="closePatchModal()">Cancel</button>

        </div>
    </div>
</div>

<div id="render-menu" style="display: none;">
    <button onclick="goToEdit()">Edit Page</button>
</div>

<div id="ui-container" style="display: contents;">
    <header>
        <div style="font-weight: 900; color: var(--primary); flex-shrink:0;">HTML SHRINKRAY v3</div>
        
        <div class="url-box">
            <span style="font-size: 10px; font-weight: bold; flex-shrink:0;">SHARE EDIT</span>
            <input id="url-edit-input" class="url-display-input" readonly value="...">
            <button class="sm" onclick="copyInput('#url-edit-input')">Copy</button>
        </div>

        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <div class="short-url-section">
                <button class="sm success" onclick="generateShortUrl()">🔗 Get Short URL</button>
                <button class="sm warning" onclick="openPatchModal()">📝 Patch</button>
                <input id="short-url-input" class="short-url-input" readonly placeholder="Short URL will appear here" style="display:none;">
                <span id="short-url-status" class="status-badge" style="display:none;"></span>
            </div>
            <button class="sm danger" onclick="clearAll()">Clear All</button>
            <button class="sm" onclick="downloadSelf()">Download Standalone</button>
        </div>
    </header>

    <div class="main-container">
        <div class="panel">
            <div class="panel-header">Source HTML</div>
            <textarea id="input" placeholder="Paste HTML..."></textarea>
        </div>

        <div class="center-actions">
            <button class="primary" onclick="update(true)">Shrink ➔</button>
            <button onclick="update(false)">⬅ Expand</button>
        </div>

        <div class="panel">
            <div class="panel-header">Compressed String (Base64)</div>
            <textarea id="output" placeholder="Compressed string..."></textarea>
        </div>

        <div class="panel preview-panel" style="grid-column: span 3;">
            <div class="panel-header">
                Live Preview
                <div class="preview-controls">
                    <input id="url-direct-input" class="preview-url-field" readonly value="">
                    <button class="sm" onclick="refreshPreview()">Refresh ↻</button>
                    <button class="sm" onclick="window.open($('#url-direct-input').value, '_blank')">New Tab ↗</button>
                    <button class="sm" id="fs-btn" onclick="toggleFS()">Fullscreen</button>
                </div>
            </div>
            <iframe id="preview-frame"></iframe>
        </div>
    </div>
</div>

<script>
    const $ = (a) => document.querySelector(a);
    let brotli = null;
    let noRefresh = false;
    let currentSha1 = null;

    // --- PATCH ENGINE ---

    function normalizeLine(line) {
        return line.trim().replace(/\s+/g, ' ');
    }

    function findExactMatch(source, findLines) {
        for (let i = 0; i <= source.length - findLines.length; i++) {
            let match = true;
            for (let j = 0; j < findLines.length; j++) {
                if (source[i + j] !== findLines[j]) {
                    match = false;
                    break;
                }
            }
            if (match) return i;
        }
        return -1;
    }

    function findFuzzyMatch(source, findLines, threshold) {
        const normalizedFind = findLines.map(normalizeLine);
        const normalizedSource = source.map(normalizeLine);
        
        for (let i = 0; i <= normalizedSource.length - normalizedFind.length; i++) {
            let matches = 0;
            for (let j = 0; j < normalizedFind.length; j++) {
                if (normalizedSource[i + j] === normalizedFind[j]) {
                    matches++;
                }
            }
            const ratio = matches / normalizedFind.length;
            if (ratio >= threshold) {
                return { position: i, ratio: ratio };
            }
        }
        return null;
    }

        const replaceMatch = patchBlock.match(/<<<REPLACE\s*([\s\S]*?)\s*>>>/);
        
        if (!findMatch || !replaceMatch) {
            throw new Error('Invalid patch format: Missing FIND or REPLACE block');
        }

        const findLines = findMatch[1].split('\n');
        const replaceLines = replaceMatch[1].split('\n');
        const sourceLines = text.split('\n');

        // Try exact match first
        let pos = findExactMatch(sourceLines, findLines);
        let matchType = 'exact';
        let ratio = 1.0;

        // If exact fails, try fuzzy
        if (pos === -1) {
            const fuzzyResult = findFuzzyMatch(sourceLines, findLines, 0.6);
            if (fuzzyResult) {
                pos = fuzzyResult.position;
                ratio = fuzzyResult.ratio;
                matchType = 'fuzzy';
            }
        }

        if (pos === -1) {
            return { applied: false, matchType: null, ratio: 0, message: 'No match found (exact or fuzzy)' };
        }

        // Apply replacement
        const result = [
            ...sourceLines.slice(0, pos),
            ...replaceLines,
            ...sourceLines.slice(pos + findLines.length)
        ];

        return {
            applied: true,
            matchType: matchType,
            ratio: ratio,
            result: result.join('\n'),
            matchLine: pos + 1,
            context: sourceLines.slice(Math.max(0, pos - 2), Math.min(sourceLines.length, pos + findLines.length + 2))
        };
    }

    // --- MODAL FUNCTIONS ---

    let pendingPatchResult = null;

function openPatchModal() {
        const modal = document.getElementById('patch-modal');
        modal.classList.add('active');
        document.getElementById('patch-input').value = '';
        document.getElementById('patch-preview').style.display = 'none';
        document.getElementById('patch-apply-btn').disabled = true;
        document.getElementById('patch-input').focus();
        // Clear any previous status
        const statusEl = document.getElementById('short-url-status');
        statusEl.style.display = 'none';
    }

    function closePatchModal() {
        document.getElementById('patch-modal').classList.remove('active');
        pendingPatchResult = null;
    }

function previewPatch() {
        const input = document.getElementById('patch-input').value;
        if (!input.trim()) {
            document.getElementById('patch-preview').style.display = 'none';
            document.getElementById('patch-apply-btn').disabled = true;
            return;
        }

        const currentHTML = document.getElementById('input').value;
        try {
            const result = applyPatchToText(currentHTML, input);
            pendingPatchResult = result;

            const previewDiv = document.getElementById('patch-preview');
            const infoDiv = document.getElementById('patch-match-info');
            const contentDiv = document.getElementById('patch-preview-content');

            previewDiv.style.display = 'block';

            if (result.applied) {
                infoDiv.className = 'match-info success';
                infoDiv.innerHTML = `
                    ✅ Match found! (${result.matchType} match, ${Math.round(result.ratio * 100)}% confidence)<br>
                    Located at line ${result.matchLine}
                `;
                // Show diff preview
                const lines = result.result.split('\n');
                const previewLines = lines.slice(Math.max(0, result.matchLine - 5), Math.min(lines.length, result.matchLine + 15));
                contentDiv.textContent = previewLines.map((line, i) => {
                    const lineNum = result.matchLine - 5 + i;
                    return `${String(lineNum).padStart(4, ' ')}: ${line}`;
                }).join('\n');
                document.getElementById('patch-apply-btn').disabled = false;
            } else {
                infoDiv.className = 'match-info error';
                infoDiv.textContent = `❌ ${result.message}`;
                contentDiv.textContent = '';
                document.getElementById('patch-apply-btn').disabled = true;
            }
        } catch (e) {
            const infoDiv = document.getElementById('patch-match-info');
            infoDiv.className = 'match-info error';
            infoDiv.textContent = `❌ Error: ${e.message}`;
            document.getElementById('patch-apply-btn').disabled = true;
            document.getElementById('patch-preview').style.display = 'block';
        }
    }

function applyPatchAndClose() {
        if (!pendingPatchResult || !pendingPatchResult.applied) return;
        
        // Apply the patch to the textarea content
        document.getElementById('input').value = pendingPatchResult.result;
        // Re-shrink to update the compressed output and preview
        update(true);
        
        // Close the modal
        closePatchModal();
        
        // Show success message
        const statusEl = document.getElementById('short-url-status');
        statusEl.style.display = 'inline-block';
        statusEl.className = 'status-badge success';
        statusEl.textContent = '✅ Patch applied! Content updated.';
    }

    // Auto-preview on input change
    document.addEventListener('DOMContentLoaded', function() {
        const patchInput = document.getElementById('patch-input');
        if (patchInput) {
            patchInput.addEventListener('input', previewPatch);
        }
    });

    // --- GITHUB CONFIG ---

    const GITHUB_CONFIG = {
        stageRepo: 'tylerperyea/datastore-stage',
        prodRepo: 'tylerperyea/data_store',
        stageToken: 'github_' + 'pat_11AAMCGSQ0kp2P5A5ZPklQ_1tRRR6MYKe0drKGXiXyhttx05QkD16vgjuOtFwpmKMoVKJQZVW5PokpeX2n'
    };

    // --- HASH PARSING ---

    function getHashParams() {
        const hash = window.location.hash.substring(1);
        const params = {};
        if (!hash) return params;
        const pairs = hash.split('&');
        for (const pair of pairs) {
            const [key, value] = pair.split('=');
            if (key && value !== undefined) {
                params[key] = decodeURIComponent(value);
            }
        }
        return params;
    }

    function cleanAndPadBase64(str) {
        let cleaned = str.replace(/\s/g, '').replace(/-/g, '+').replace(/_/g, '/');
        while (cleaned.length % 4 !== 0) {
            cleaned += '=';
        }
        return cleaned;
    }

    // --- SHA1 ---
    async function sha1(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-1', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // --- BROTLI HELPERS ---
    async function compressToBinary(text) {
        return brotli.compress(new TextEncoder().encode(text));
    }

    function decompressFromBinary(binary) {
        return new TextDecoder().decode(brotli.decompress(binary));
    }

    async function compressToBase64(text) {
        const bin = await compressToBinary(text);
        return btoa(String.fromCharCode(...bin));
    }

    function decompressFromBase64(b64) {
        const cleaned = cleanAndPadBase64(b64);
        const binary = Uint8Array.from(atob(cleaned), c => c.charCodeAt(0));
        return decompressFromBinary(binary);
    }

    // --- GITHUB API WRAPPERS ---

    async function getFileFromRepo(owner, repo, path, token = null) {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        const headers = token ? { 'Authorization': `token ${token}` } : {};
        try {
            const response = await fetch(url, { headers });
            if (!response.ok) {
                if (response.status === 404) return null;
                throw new Error(`GitHub API error: ${response.status}`);
            }
            return await response.json();
        } catch (error) {
            console.error('Error fetching from GitHub:', error);
            return null;
        }
    }

    async function createFileInRepo(owner, repo, path, contentBase64, message, token) {
        const doubleEncoded = btoa(contentBase64);
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        const body = {
            message: message || `Add ${path}`,
            content: doubleEncoded,
            branch: 'main'
        };

        try {
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(body)
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(`Failed to create file: ${response.status} - ${errorData.message}`);
            }
            return await response.json();
        } catch (error) {
            console.error('Error creating file:', error);
            throw error;
        }
    }

    async function resolveSha1(sha1Hash) {
        const prodData = await getFileFromRepo(
            GITHUB_CONFIG.prodRepo.split('/')[0],
            GITHUB_CONFIG.prodRepo.split('/')[1],
            sha1Hash
        );
        if (prodData) {
            const base64String = atob(prodData.content);
            return { found: true, repo: 'prod', base64: base64String };
        }

        const stageData = await getFileFromRepo(
            GITHUB_CONFIG.stageRepo.split('/')[0],
            GITHUB_CONFIG.stageRepo.split('/')[1],
            sha1Hash,
            GITHUB_CONFIG.stageToken
        );
        if (stageData) {
            const base64String = atob(stageData.content);
            return { found: true, repo: 'staging', base64: base64String };
        }

        return { found: false };
    }

    // --- CORE UI LOGIC ---

    function buildUrls(base64String) {
        const base = window.location.origin + window.location.pathname;
        const encoded = encodeURIComponent(base64String);
        return {
            direct: `${base}#html=${encoded}&nomenu=1`,
            edit: `${base}?edit=1#html=${encoded}`
        };
    }

    async function update(fromInput = true) {
        const inputVal = $('#input').value;
        const outputVal = $('#output').value;

        if (fromInput && !inputVal) return;
        if (!fromInput && !outputVal) return;

        let b64;
        if (fromInput) {
            b64 = await compressToBase64(inputVal);
            $('#output').value = b64;
        } else {
            try {
                const raw = decompressFromBase64(outputVal);
                $('#input').value = raw;
                b64 = outputVal;
            } catch (e) {
                alert('Failed to decompress. Is the string valid?');
                return;
            }
        }

        const urls = buildUrls(b64);
        $('#url-direct-input').value = urls.direct;
        $('#url-edit-input').value = urls.edit;

        noRefresh = true;
        window.history.replaceState({ html: b64 }, '', urls.edit);

        if ($('#preview-frame').src === urls.direct) {
            refreshPreview();
        } else {
            $('#preview-frame').src = urls.direct;
        }
    }

    function refreshPreview() {
        const frame = $('#preview-frame');
        if (frame.contentWindow) {
            frame.contentWindow.location.reload();
        }
    }

    // --- SHORT URL GENERATION ---

    async function generateShortUrl() {
        const inputVal = $('#input').value;
        if (!inputVal) {
            alert('Please enter some HTML first!');
            return;
        }

        const statusEl = document.getElementById('short-url-status');
        const urlInput = document.getElementById('short-url-input');

        statusEl.style.display = 'inline-block';
        statusEl.className = 'status-badge loading';
        statusEl.textContent = '⏳ Processing...';
        urlInput.style.display = 'none';

        const oldCopy = document.querySelector('.short-url-section .copy-btn');
        if (oldCopy) oldCopy.remove();

        try {
            const sha1Hash = await sha1(inputVal);
            currentSha1 = sha1Hash;

            const b64 = $('#output').value;
            if (!b64) {
                const compressed = await compressToBase64(inputVal);
                $('#output').value = compressed;
            }

            await createFileInRepo(
                GITHUB_CONFIG.stageRepo.split('/')[0],
                GITHUB_CONFIG.stageRepo.split('/')[1],
                sha1Hash,
                $('#output').value,
                `Add page ${sha1Hash}`,
                GITHUB_CONFIG.stageToken
            );

            const base = window.location.origin + window.location.pathname;
            
            // Generate both URLs
            const editUrl = `${base}?edit=1#sha1=${sha1Hash}`;
            const viewUrl = `${base}#sha1=${sha1Hash}`;

            statusEl.className = 'status-badge success';
            statusEl.textContent = '✅ URL generated!';
            urlInput.style.display = 'inline-block';
            urlInput.value = editUrl;

            // Add two copy buttons
            const section = document.querySelector('.short-url-section');
            
            const copyEditBtn = document.createElement('button');
            copyEditBtn.className = 'sm copy-btn';
            copyEditBtn.textContent = '📋 Copy Edit';
            copyEditBtn.onclick = () => {
                navigator.clipboard.writeText(editUrl);
                copyEditBtn.textContent = '✅ Copied!';
                setTimeout(() => { copyEditBtn.textContent = '📋 Copy Edit'; }, 2000);
            };
            section.appendChild(copyEditBtn);

            const copyViewBtn = document.createElement('button');
            copyViewBtn.className = 'sm copy-btn';
            copyViewBtn.textContent = '📋 Copy View';
            copyViewBtn.onclick = () => {
                navigator.clipboard.writeText(viewUrl);
                copyViewBtn.textContent = '✅ Copied!';
                setTimeout(() => { copyViewBtn.textContent = '📋 Copy View'; }, 2000);
            };
            section.appendChild(copyViewBtn);

            // Update the current URL to use SHA1 form
            noRefresh = true;
            window.history.replaceState({ sha1: sha1Hash }, '', editUrl);
            
            // Update the direct URL input to show the view URL
            $('#url-direct-input').value = viewUrl;
            $('#url-edit-input').value = editUrl;

            console.log('Short URLs generated:', { edit: editUrl, view: viewUrl });
        } catch (error) {
            statusEl.className = 'status-badge error';
            statusEl.textContent = `❌ Error: ${error.message}`;
            console.error('Error generating short URL:', error);
        }
    }

    // --- LOAD FROM SHA1 ---

    async function loadFromSha1(sha1Hash) {
        const statusEl = document.getElementById('short-url-status');
        const urlInput = document.getElementById('short-url-input');

        statusEl.style.display = 'inline-block';
        statusEl.className = 'status-badge loading';
        statusEl.textContent = '⏳ Loading...';

        try {
            const result = await resolveSha1(sha1Hash);
            if (result.found) {
                const html = decompressFromBase64(result.base64);
                $('#input').value = html;
                $('#output').value = result.base64;

                const urls = buildUrls(result.base64);
                $('#url-direct-input').value = urls.direct;
                
                // Update edit URL to use SHA1
                const base = window.location.origin + window.location.pathname;
                const editUrl = `${base}?edit=1#sha1=${sha1Hash}`;
                $('#url-edit-input').value = editUrl;
                
                noRefresh = true;
                window.history.replaceState({ sha1: sha1Hash }, '', editUrl);
                $('#preview-frame').src = urls.direct;

                statusEl.className = 'status-badge success';
                statusEl.textContent = `✅ Loaded from ${result.repo}`;

                const shortUrl = `${base}?edit=1#sha1=${sha1Hash}`;
                urlInput.style.display = 'inline-block';
                urlInput.value = shortUrl;

                return true;
            } else {
                statusEl.className = 'status-badge error';
                statusEl.textContent = '❌ Not found in prod or staging';
                return false;
            }
        } catch (error) {
            statusEl.className = 'status-badge error';
            statusEl.textContent = `❌ Error: ${error.message}`;
            console.error('Error loading from SHA1:', error);
            return false;
        }
    }

    // --- CLEAR ---

    function clearAll() {
        if (confirm("Clear everything and start fresh?")) {
            $('#input').value = '';
            $('#output').value = '';
            $('#url-direct-input').value = '';
            $('#url-edit-input').value = '';
            document.getElementById('short-url-input').style.display = 'none';
            document.getElementById('short-url-status').style.display = 'none';
            const copyBtns = document.querySelectorAll('.short-url-section .copy-btn');
            copyBtns.forEach(b => b.remove());
            window.history.replaceState({}, '', window.location.origin + window.location.pathname);
            $('#preview-frame').src = 'about:blank';
            currentSha1 = null;
        }
    }

    // --- DOWNLOAD ---

    function downloadSelf() {
        const comp = $('#output').value;
        if (!comp) return alert("Shrink something first!");
        const docHtml = document.documentElement.outerHTML;
        const blob = new Blob([docHtml], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `shrinkray-${Date.now()}.html`;
        a.click();
        URL.revokeObjectURL(url);
    }

    // --- UI HELPERS ---

    function toggleFS() {
        document.body.classList.toggle('preview-fs');
        $('#fs-btn').innerText = document.body.classList.contains('preview-fs') ? "Exit Fullscreen" : "Fullscreen";
    }

    function copyInput(selector) {
        const el = $(selector);
        el.select();
        navigator.clipboard.writeText(el.value);
    }

    function goToEdit() {
        const hash = window.location.hash;
        window.location.href = window.location.origin + window.location.pathname + "?edit=1" + hash;
    }

    // --- MAIN LOGIC ---

    function runLogic() {
        const params = getHashParams();
        const htmlData = params.html;
        const sha1Param = params.sha1;
        const noMenu = params.nomenu;

        if (sha1Param) {
            document.body.classList.add('ui-visible');
            loadFromSha1(sha1Param);
            return;
        }

        if (htmlData) {
            try {
                const raw = decompressFromBase64(htmlData);
                if (!noMenu) $('#render-menu').style.display = 'block';
                document.open();
                document.write(raw);
                document.close();
                const script = document.createElement('script');
                script.textContent = `window.onhashchange = () => window.location.reload();`;
                document.body.appendChild(script);
            } catch (e) {
                document.body.style.display = 'block';
                document.body.innerText = "Error: " + e.message;
            }
            return;
        }

        document.body.classList.add('ui-visible');
        if (htmlData) {
            $('#output').value = htmlData;
            try {
                const raw = decompressFromBase64(htmlData);
                $('#input').value = raw;
                const urls = buildUrls(htmlData);
                $('#url-direct-input').value = urls.direct;
                $('#url-edit-input').value = urls.edit;
                $('#preview-frame').src = urls.direct;
            } catch (e) {
                console.error('Failed to decompress:', e);
                $('#input').value = '[Error: Invalid compressed data]';
            }
        }
    }

    // --- INIT ---

    import("https://unpkg.com/brotli-wasm@3.0.0/index.web.js?module")
        .then(m => m.default)
        .then(b => {
            brotli = b;
            runLogic();
        })
        .catch(err => {
            console.error('Failed to load brotli:', err);
            document.body.innerText = 'Failed to load compression library.';
        });

    window.addEventListener('hashchange', function() {
        if (!noRefresh) {
            runLogic();
        } else {
            noRefresh = false;
        }
    });
</script>
</body>
</html>
